# 机场订阅
proxy-providers:
  Airport1:
    url: ""
    type: http
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

# 节点信息
proxies:
  - {name: 直连, type: direct}

# 全局配置 
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 嗅探（fakeip下其实可以不用嗅探）
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 入站
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用仅内核自行修改下面三项为true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
 
# 出站
proxy-groups:
  - {name: 🚀 手动选择, type: select, proxies: [🇺🇸 美国, 🇯🇵 日本, 🇭🇰 香港, 🇸🇬 新加坡, 🇹🇼 台湾, 🇰🇷 韩国, 🌐 全部节点, 直连]}
  - {name: ♻️ 自动选择, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "^((?!(直连)).)*$"}
  - {name: 🐟 漏网之鱼, type: select, proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 美国, 🇯🇵 日本, 🇭🇰 香港, 🇸🇬 新加坡, 🇹🇼 台湾, 🇰🇷 韩国, 直连]}

  - {name: 📹 YouTube, type: select, proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 美国, 🇯🇵 日本, 🇭🇰 香港, 🇸🇬 新加坡, 🇹🇼 台湾, 🇰🇷 韩国, 直连]}
  - {name: 🍀 Google, type: select, proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 美国, 🇯🇵 日本, 🇭🇰 香港, 🇸🇬 新加坡, 🇹🇼 台湾, 🇰🇷 韩国, 直连]}
  - {name: 🤖 ChatGPT, type: select, proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 美国, 🇯🇵 日本, 🇸🇬 新加坡, 🇹🇼 台湾, 🇰🇷 韩国, 直连]}
  - {name: 👨🏿‍💻 GitHub, type: select, proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 美国, 🇯🇵 日本, 🇭🇰 香港, 🇸🇬 新加坡, 🇹🇼 台湾, 🇰🇷 韩国, 直连]}
  - {name: 🪟 Microsoft, type: select, proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 美国, 🇯🇵 日本, 🇭🇰 香港, 🇸🇬 新加坡, 🇹🇼 台湾, 🇰🇷 韩国, 直连]}
  - {name: 🐬 OneDrive, type: select, proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 美国, 🇯🇵 日本, 🇭🇰 香港, 🇸🇬 新加坡, 🇹🇼 台湾, 🇰🇷 韩国, 直连]}
  - {name: 🎵 TikTok, type: select, proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 美国, 🇯🇵 日本, 🇸🇬 新加坡, 🇹🇼 台湾, 🇰🇷 韩国, 直连]}
  - {name: 📲 Telegram, type: select, proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 美国, 🇯🇵 日本, 🇭🇰 香港, 🇸🇬 新加坡, 🇹🇼 台湾, 🇰🇷 韩国, 直连]}
  - {name: 🎥 NETFLIX, type: select, proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 美国, 🇯🇵 日本, 🇸🇬 新加坡, 🇹🇼 台湾, 🇰🇷 韩国, 直连]}
  - {name: 💶 PayPal, type: select, proxies: [🚀 手动选择, ♻️ 自动选择, 🇺🇸 美国, 🇯🇵 日本, 🇭🇰 香港, 🇸🇬 新加坡, 🇹🇼 台湾, 🇰🇷 韩国, 直连]}

  - {name: 🇺🇸 美国, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(美|US|(?i)States|America))"}
  - {name: 🇯🇵 日本, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(日|JP|(?i)Japan))"}
  - {name: 🇭🇰 香港, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(港|HK|(?i)Hong))"}
  - {name: 🇸🇬 新加坡, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(新加坡|坡|狮城|SG|Singapore))"}
  - {name: 🇹🇼 台湾, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(台|TW|(?i)Taiwan))"}
  - {name: 🇰🇷 韩国, type: url-test, include-all: true, tolerance: 20, interval: 300, filter: "(?=.*(韩|KR|(?i)Korea))"}
  - {name: 🌐 全部节点, type: select, include-all: true}

# 规则匹配
rules:
  - RULE-SET,ad_domain,REJECT
  - RULE-SET,private_ip,直连,no-resolve
  - RULE-SET,private_domain,直连
  - RULE-SET,proxylite,🚀 手动选择
  - RULE-SET,ai,🤖 ChatGPT
  - RULE-SET,github_domain,👨🏿‍💻 GitHub
  - RULE-SET,youtube_domain,📹 YouTube
  - RULE-SET,google_domain,🍀 Google
  - RULE-SET,onedrive_domain,🐬 OneDrive
  - RULE-SET,microsoft_domain,🪟 Microsoft
  - RULE-SET,apple_domain,直连
  - RULE-SET,tiktok_domain,🎵 TikTok
  - RULE-SET,telegram_domain,📲 Telegram
  - RULE-SET,netflix_domain,🎥 NETFLIX
  - RULE-SET,paypal_domain,💶 PayPal
  - RULE-SET,apple_ip,直连
  - RULE-SET,google_ip,🍀 Google
  - RULE-SET,netflix_ip,🎥 NETFLIX
  - RULE-SET,telegram_ip,📲 Telegram
  - RULE-SET,geolocation-!cn,🚀 手动选择
  - RULE-SET,cn_domain,直连
  - RULE-SET,cn_ip,直连
  - MATCH,🐟 漏网之鱼

# 规则集
